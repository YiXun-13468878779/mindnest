<!DOCTYPE html>
<!-- 运行此文件，右键另存各图标为 PNG 到 icons/ 目录 -->
<html>
<body style="background:#fff;padding:20px;font-family:sans-serif">
<h3>MindNest 图标生成器 - 右键每个 canvas 选"另存为图片"到 icons/ 目录</h3>
<div style="display:flex;gap:20px;align-items:flex-end;margin-top:16px">

<div>
  <p>icon16.png</p>
  <canvas id="c16" width="16" height="16"></canvas>
</div>
<div>
  <p>icon48.png</p>
  <canvas id="c48" width="48" height="48"></canvas>
</div>
<div>
  <p>icon128.png</p>
  <canvas id="c128" width="128" height="128"></canvas>
</div>

</div>

<script>
function drawIcon(canvas) {
  const s = canvas.width
  const ctx = canvas.getContext('2d')
  const r = s * 0.15

  // 背景
  ctx.fillStyle = '#2563eb'
  ctx.beginPath()
  ctx.roundRect(0, 0, s, s, r)
  ctx.fill()

  // 大脑图标（简化）
  ctx.fillStyle = 'white'
  const cx = s / 2, cy = s / 2
  const sz = s * 0.55

  // 用文字 emoji 绘制
  ctx.font = `${sz}px serif`
  ctx.textAlign = 'center'
  ctx.textBaseline = 'middle'
  ctx.fillText('🧠', cx, cy + sz * 0.05)
}

['c16','c48','c128'].forEach(id => {
  drawIcon(document.getElementById(id))
})

// 自动下载
function download(id, name) {
  const a = document.createElement('a')
  a.download = name
  a.href = document.getElementById(id).toDataURL('image/png')
  a.click()
}

const btn = document.createElement('button')
btn.textContent = '一键下载全部图标'
btn.style.cssText = 'margin-top:20px;padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px'
btn.onclick = () => {
  download('c16', 'icon16.png')
  setTimeout(() => download('c48', 'icon48.png'), 300)
  setTimeout(() => download('c128', 'icon128.png'), 600)
}
document.body.appendChild(btn)

const note = document.createElement('p')
note.style.cssText = 'margin-top:12px;color:#64748b;font-size:13px'
note.textContent = '下载后将 icon16.png, icon48.png, icon128.png 移动到 browser-extension/icons/ 目录'
document.body.appendChild(note)
</script>
</body>
</html>
